<style>
  :root {
    --bg: #0b0d12;
    --card: #141720;
    --border: #232733;
    --text: #e6e8eb;
    --muted: #9aa3b2;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --orange: #fb923c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 20px; }
  .header {
    border-left: 6px solid var(--green);
    padding-left: 16px;
    margin-bottom: 20px;
    background: linear-gradient(90deg, rgba(74,222,128,0.08), transparent);
    border-radius: 0 12px 12px 0;
  }
  .header h1 { margin: 0; font-size: 24px; }
  .header p { margin: 6px 0 0; opacity: .9; }
  .meta { font-size: 12px; opacity: .65; margin-top: 6px; }
  .grid { display: grid; gap: 14px; }
  .col-2 { grid-template-columns: repeat(2, 1fr); }
  @media (max-width: 860px) { .col-2 { grid-template-columns: 1fr; } }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 18px;
    box-shadow: 0 12px 30px rgba(0,0,0,.35);
  }
  .card h3 {
    margin: 0 0 10px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: .3px;
    opacity: .95;
  }
  h1 { font-size: 22px; margin: 18px 0 10px; }
  h2 { font-size: 18px; margin-top: 22px; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  h3 { font-size: 15px; margin-top: 14px; margin-bottom: 8px; }
  hr { border: 1px solid var(--border); margin: 22px 0; }
  p, li { line-height: 1.75; font-size: 14px; }
  ul { padding-left: 18px; }
  blockquote {
    border-left: 4px solid var(--yellow);
    padding: 10px 14px;
    margin: 10px 0;
    background: rgba(251,191,36,0.06);
    border-radius: 0 10px 10px 0;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    margin: 10px 0;
    font-size: 13.5px;
    background: var(--card);
    border-radius: 10px;
    overflow: hidden;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 8px 10px;
    text-align: left;
    vertical-align: top;
    line-height: 1.6;
  }
  thead th, tr:first-child th {
    background: #1b2030;
    color: var(--text);
    font-weight: 700;
  }
  tbody tr:nth-child(even) { background: rgba(255,255,255,0.03); }
  table.kv td.lbl {
    background: rgba(74,222,128,0.10);
    font-weight: 600;
    white-space: nowrap;
    width: 1%;
  }
  .footer {
    opacity: .55;
    font-size: 12px;
    margin-top: 20px;
    text-align: right;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  /* 解鎖覆蓋層 */
  #lock {
    position: fixed; inset: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    background: rgba(5,7,11,0.96);
  }
  #lock .box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px 32px; width: min(92vw, 360px);
    box-shadow: 0 20px 60px rgba(0,0,0,.6); text-align: center;
  }
  #lock h2 { border: none; margin: 0 0 6px; font-size: 18px; }
  #lock p { opacity: .7; font-size: 13px; margin: 0 0 16px; }
  #lock input {
    width: 100%; padding: 11px 12px; font-size: 15px; text-align: center;
    letter-spacing: 2px; border-radius: 10px; border: 1px solid var(--border);
    background: #0b0d12; color: var(--text); margin-bottom: 12px;
  }
  #lock button {
    width: 100%; padding: 11px; font-size: 15px; font-weight: 700;
    border: none; border-radius: 10px; cursor: pointer;
    background: var(--green); color: #08130c;
  }
  #lock .err { color: var(--red); font-size: 12.5px; min-height: 16px; margin-top: 8px; }
</style>

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
    baseKey,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

function b64ToBuf(b64) {
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf;
}

async function unlock() {
  const errEl = document.getElementById('err');
  errEl.textContent = '';
  const pw = document.getElementById('pw').value;
  if (!pw) { errEl.textContent = '請輸入密碼'; return; }
  try {
    const salt = b64ToBuf(ENC.salt);
    const iv = b64ToBuf(ENC.iv);
    const ct = b64ToBuf(ENC.ct);
    const key = await deriveKey(pw, salt);
    const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
    const html = new TextDecoder().decode(plainBuf);
    document.getElementById('report-body').innerHTML = html;
    buildSummary();
    document.getElementById('lock').style.display = 'none';
    document.getElementById('main').style.visibility = 'visible';
  } catch (e) {
    errEl.textContent = '密碼錯誤或解密失敗';
  }
}

function buildSummary() {
  const h2s = document.querySelectorAll('#report-body h2');
  const box = document.getElementById('summary');
  const map = {
    '核心診斷': '🎯', '籌碼判斷': '💎', '關鍵支撐位': '🛡️', '關鍵壓力位': '🔺',
    '短線劇本': '📅', '波段劇本': '🌊', '風險警訊': '⚠️', '合理估值區間': '💡', '操作建議': '✅', '法人觀點小結': '🧠'
  };
  let html = '';
  h2s.forEach(el => {
    const t = el.textContent.trim();
    const key = t.split('（')[0].split('(')[0].trim();
    const icon = map[key] || '📌';
    html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px dashed var(--border);"><div style="width:28px;text-align:center;">' + icon + '</div><div style="font-size:13px;opacity:.9;">' + t + '</div></div>';
  });
  box.innerHTML = html || '<p style="opacity:.7;font-size:13px;">請開啟報告全文查看。</p>';
}

document.getElementById('unlock').addEventListener('click', unlock);
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
</script>
