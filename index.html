<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>7769 鴻勁｜機構級深度分析</title>
<style>
  :root {
    --bg: #0b0d12;
    --card: #141720;
    --card-2: #181c27;
    --border: #232733;
    --border-soft: #1c2030;
    --text: #e6e8eb;
    --text-strong: #f4f6f8;
    --muted: #9aa3b2;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --orange: #fb923c;
    --radius: 14px;
    --shadow: 0 12px 30px rgba(0,0,0,.35);
    --mono: "SF Mono", "JetBrains Mono", "Roboto Mono", ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 21px;
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 32px 24px 48px; }
  .header {
    border-left: 6px solid var(--green);
    padding: 14px 18px;
    margin-bottom: 28px;
    background: linear-gradient(90deg, rgba(74,222,128,0.08), transparent);
    border-radius: 0 var(--radius) var(--radius) 0;
  }
  .header h1 { margin: 0; font-size: 30px; letter-spacing: -0.02em; font-weight: 800; color: var(--text-strong); }
  .header p { margin: 8px 0 0; opacity: .9; font-size: 15.5px; }
  .meta { font-size: 12px; opacity: .6; margin-top: 8px; font-variant-numeric: tabular-nums; }
  .grid { display: grid; gap: 16px; }
  .col-2 { grid-template-columns: repeat(2, 1fr); }
  @media (max-width: 760px) { .col-2 { grid-template-columns: 1fr; } .wrap { padding: 20px 16px 36px; } }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .card h3 {
    margin: 0 0 12px;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.4px;
    opacity: .92;
    color: var(--text-strong);
  }
  h1 { font-size: 30px; margin: 22px 0 12px; letter-spacing: -0.01em; }
  h2 { font-size: 24px; margin-top: 28px; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; font-weight: 700; color: var(--text-strong); }
  h3 { font-size: 20px; margin-top: 16px; margin-bottom: 8px; font-weight: 600; }
  hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  p { margin: 10px 0; }
  li { line-height: 1.75; margin: 6px 0; }
  ul { padding-left: 18px; }
  blockquote {
    border-left: 4px solid var(--yellow);
    padding: 12px 16px;
    margin: 14px 0;
    background: rgba(251,191,36,0.06);
    border-radius: 0 10px 10px 0;
    font-size: 18px;
    color: var(--text);
  }
  /* 表格：財務報告核心 — 數字右對齊 + 等寬數字 */
  table {
    border-collapse: collapse;
    width: 100%;
    margin: 14px 0;
    font-size: 18px;
    background: var(--card);
    border-radius: 10px;
    overflow: hidden;
    font-variant-numeric: tabular-nums;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 9px 12px;
    text-align: left;
    vertical-align: top;
    line-height: 1.55;
  }
  /* 數值欄：等寬數字避免抖動（財務報告核心）— 右對齊由 .num class 或由 md_to_html 標記 */
  td, th { font-variant-numeric: tabular-nums; }
  thead th, tr:first-child th {
    background: #1b2030;
    color: var(--text-strong);
    font-weight: 700;
    letter-spacing: 0.3px;
    text-align: left;
  }
  tbody tr:nth-child(even) { background: rgba(255,255,255,0.03); }
  tbody tr:hover { background: rgba(96,165,250,0.06); }
  table.kv td.lbl {
    background: rgba(74,222,128,0.10);
    font-weight: 600;
    white-space: nowrap;
    width: 1%;
  }
  .footer {
    opacity: .5;
    font-size: 12px;
    margin-top: 28px;
    text-align: right;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  /* 解鎖覆蓋層 */
  #lock {
    position: fixed; inset: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    background: rgba(5,7,11,0.96);
    backdrop-filter: blur(8px);
  }
  #lock .box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 30px 34px; width: min(92vw, 360px);
    box-shadow: 0 20px 60px rgba(0,0,0,.6); text-align: center;
  }
  #lock h2 { border: none; margin: 0 0 6px; font-size: 18px; }
  #lock p { opacity: .7; font-size: 13px; margin: 0 0 16px; }
  #lock input {
    width: 100%; padding: 11px 12px; font-size: 15px; text-align: center;
    letter-spacing: 2px; border-radius: 10px; border: 1px solid var(--border);
    background: #0b0d12; color: var(--text); margin-bottom: 12px;
    font-family: var(--mono);
  }
  #lock button {
    width: 100%; padding: 11px; font-size: 15px; font-weight: 700;
    border: none; border-radius: 10px; cursor: pointer;
    background: var(--green); color: #08130c;
    transition: transform 100ms ease-out, filter 100ms ease-out;
  }
  #lock button:active { transform: scale(0.97); filter: brightness(1.05); }
  #lock .err { color: var(--red); font-size: 12.5px; min-height: 16px; margin-top: 8px; }
</style>

</head>

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
    baseKey,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

function b64ToBuf(b64) {
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf;
}

async function unlock() {
  const errEl = document.getElementById('err');
  errEl.textContent = '';
  const pw = document.getElementById('pw').value;
  if (!pw) { errEl.textContent = '請輸入密碼'; return; }
  try {
    const salt = b64ToBuf(ENC.salt);
    const iv = b64ToBuf(ENC.iv);
    const ct = b64ToBuf(ENC.ct);
    const key = await deriveKey(pw, salt);
    const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
    const html = new TextDecoder().decode(plainBuf);
    document.getElementById('report-body').innerHTML = html;
    document.getElementById('lock').style.display = 'none';
    document.getElementById('main').style.visibility = 'visible';
  } catch (e) {
    errEl.textContent = '密碼錯誤或解密失敗';
  }
}

document.getElementById('unlock').addEventListener('click', unlock);
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
</script>
